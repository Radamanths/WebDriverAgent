name: Build WDA IPA

on:
  workflow_dispatch:
    inputs:
      device_udid:
        description: 'Device UDID'
        required: true
        default: ''
      wda_version:
        description: 'WDA version tag (appium/WebDriverAgent release)'
        required: false
        default: 'v11.4.1'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout WDA
        uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          ref: ${{ github.event.inputs.wda_version }}

      - name: Setup Xcode
        run: sudo xcode-select --switch /Applications/Xcode.app

      - name: Install fastlane
        run: gem install fastlane --no-document

      - name: Setup keychain
        run: |
          security create-keychain -p buildpass build.keychain
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | sed s/\"//g)
          security default-keychain -s build.keychain
          security unlock-keychain -p buildpass build.keychain
          security set-keychain-settings -lut 21600 build.keychain

      - name: Get certificates and provisioning profiles
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          FASTLANE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          FASTLANE_DONT_STORE_PASSWORD: "1"
        run: |
          mkdir -p /tmp/fl/fastlane

          {
            echo 'lane :setup do'
            echo '  cert('
            echo '    username: ENV["APPLE_ID"],'
            echo '    keychain_name: "build",'
            echo '    keychain_password: "buildpass",'
            echo '    development: true,'
            echo '    output_path: "/tmp/fl"'
            echo '  )'
            echo '  sigh('
            echo '    username: ENV["APPLE_ID"],'
            echo '    app_identifier: "com.facebook.WebDriverAgentRunner.xctrunner",'
            echo '    development: true,'
            echo '    output_path: "/tmp/fl",'
            echo '    filename: "wda_runner.mobileprovision"'
            echo '  )'
            echo 'end'
          } > /tmp/fl/fastlane/Fastfile

          cd /tmp/fl && fastlane setup

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
          cp /tmp/fl/*.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

          TEAM_ID=$(security find-certificate -c "Apple Development" -p build.keychain | openssl x509 -noout -subject | grep -o "OU=[A-Z0-9]*" | head -1 | cut -d= -f2)
          echo "Team ID: $TEAM_ID"
          echo "TEAM_ID=$TEAM_ID" >> $GITHUB_ENV

          P12_FILE=$(ls /tmp/fl/*.p12 2>/dev/null | head -1)
          echo "P12_FILE=$P12_FILE" >> $GITHUB_ENV

      - name: Export PEM files from certificate
        run: |
          P12_FILE="${{ env.P12_FILE }}"
          if [ -z "$P12_FILE" ] || [ ! -f "$P12_FILE" ]; then
            P12_FILE=$(ls /tmp/fl/*.p12 2>/dev/null | head -1)
          fi

          mkdir -p /tmp/cert_out

          openssl pkcs12 -in "$P12_FILE" -nocerts -nodes -legacy -passin pass: \
            -out /tmp/cert_out/dev_key.pem 2>/dev/null || \
          openssl pkcs12 -in "$P12_FILE" -nocerts -nodes -passin pass: \
            -out /tmp/cert_out/dev_key.pem

          openssl pkcs12 -in "$P12_FILE" -clcerts -nokeys -legacy -passin pass: \
            -out /tmp/cert_out/dev_cert.pem 2>/dev/null || \
          openssl pkcs12 -in "$P12_FILE" -clcerts -nokeys -passin pass: \
            -out /tmp/cert_out/dev_cert.pem

          cp /tmp/fl/wda_runner.mobileprovision /tmp/cert_out/
          ls -la /tmp/cert_out/
          openssl x509 -in /tmp/cert_out/dev_cert.pem -noout -subject -dates

      - name: Build WDA IPA
        run: |
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination "generic/platform=iOS" \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="${{ env.TEAM_ID }}" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "" 2>&1 | tail -100

          APP_PATH=$(find DerivedData -name "WebDriverAgentRunner-Runner.app" \
            -not -path "*.dSYM*" | head -1)
          echo "Found: $APP_PATH"

          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r WebDriverAgent.ipa Payload/
          du -sh WebDriverAgent.ipa
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      - name: Verify codesign
        run: |
          codesign -dvvv "${{ env.APP_PATH }}" 2>&1 | head -10
          codesign -dvvv "${{ env.APP_PATH }}/PlugIns/WebDriverAgentRunner.xctest" 2>&1 | head -10

      - name: Upload WDA-Complete
        uses: actions/upload-artifact@v4
        with:
          name: WDA-Complete
          path: |
            WebDriverAgent.ipa
            /tmp/cert_out/dev_cert.pem
            /tmp/cert_out/dev_key.pem
            /tmp/cert_out/wda_runner.mobileprovision
          retention-days: 30
